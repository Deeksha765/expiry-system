<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ExpiryGuard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-icon">🛡️</div>
      <h2>ExpiryGuard</h2>
      <p>Product & Medicine Expiry Analysis System</p>
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ 'danger' if cat=='danger' else 'success' if cat=='success' else 'info' }} mb-3">
            {{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Form -->
    <form method="POST" action="{{ url_for('login') }}">

      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="username"
               name="username" placeholder="Username" required>
        <label for="username">
          <i class="material-icons-round" style="font-size:16px;vertical-align:middle">person</i>
          Username
        </label>
      </div>

      <div class="form-floating mb-4">
        <input type="password" class="form-control" id="password"
               name="password" placeholder="Password" required>
        <label for="password">
          <i class="material-icons-round" style="font-size:16px;vertical-align:middle">lock</i>
          Password
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-login w-100 text-white">
        <i class="material-icons-round" style="font-size:18px;vertical-align:middle">login</i>
        Sign In
      </button>
    </form>

    <!-- Demo Credentials -->
    <div class="mt-4 p-3 rounded-3" style="background:#f8f9ff;border:1px dashed #c5cae9;">
      <p class="mb-2" style="font-size:12px;font-weight:600;color:#5c6bc0;">
        🔑 Demo Credentials
      </p>
      <div class="d-flex gap-3">
        <div style="font-size:12px">
          <strong>Admin:</strong><br>admin / admin123
        </div>
        <div style="font-size:12px">
          <strong>User:</strong><br>john / user123
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
